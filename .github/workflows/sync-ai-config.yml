name: Sync AI Config to Project Repos

# Syncs .claude, .github/prompts, and .opencode directories from this utility repo
# to all downstream service repos on merge to main.

on:
  push:
    branches:
      - main
    paths:
      - '.claude/**'
      - '.github/prompts/**'
      - '.github/workflows/sync-ai-config.yml'
      - '.opencode/**'

jobs:
  sync:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        # ──────────────────────────────────────────────────────────────────
        # ADD NEW REPOS HERE as the team creates new services.
        # Format: { repo: "<org>/<repo-name>" }
        # ──────────────────────────────────────────────────────────────────
        target:
          - { repo: "your-org/my-order-connector" }
          - { repo: "your-org/my-order-workflow-agent" }
          - { repo: "your-org/my-notification-service" }
          # - { repo: "your-org/my-<new-service>" }

    steps:
      - name: Debug secret access
        run: |
          if [ -z "$APP_ID" ]; then
            echo "::error::AI_BOT_ID secret is empty — check org secret access for this repo"
          else
            echo "AI_BOT_ID is set (length: ${#APP_ID})"
          fi
        env:
          APP_ID: ${{ secrets.AI_BOT_APP_ID }}

      - name: Generate bot token
        id: bot-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.AI_BOT_APP_ID }}
          private-key: ${{ secrets.AI_BOT_PRIVATE_KEY }}
          owner: your-org

      - name: Checkout source (this repo)
        uses: actions/checkout@v4
        with:
          path: source
          token: ${{ steps.bot-token.outputs.token }}

      - name: Checkout target repo
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.target.repo }}
          token: ${{ steps.bot-token.outputs.token }}
          path: target

      - name: Sync directories
        run: |
          SYNC_DIRS=(".claude" ".github/prompts" ".opencode")

          for dir in "${SYNC_DIRS[@]}"; do
            if [ -d "source/${dir}" ]; then
              mkdir -p "target/${dir}"
              rsync --archive --delete "source/${dir}/" "target/${dir}/"
              echo "Synced: ${dir}"
            else
              echo "Skipped (not found in source): ${dir}"
            fi
          done

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          path: target
          token: ${{ steps.bot-token.outputs.token }}
          commit-message: "chore: sync AI skills"
          title: "chore: sync AI skills"
          body: "Synced AI skills from AI Utility"
          branch: chore/sync-ai-config
          delete-branch: true
          labels: automation, ai-config

      - name: Enable auto-merge
        if: steps.create-pr.outputs.pull-request-number != ''
        run: gh pr merge --auto --squash "${{ steps.create-pr.outputs.pull-request-number }}" --repo "${{ matrix.target.repo }}"
        env:
          GH_TOKEN: ${{ steps.bot-token.outputs.token }}
